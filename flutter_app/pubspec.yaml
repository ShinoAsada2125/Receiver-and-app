name: lora_receiver_app
description: Minimal Flutter BLE dashboard for LoRaReceiver (NUS-like)
publish_to: 'none'
version: 0.0.1

environment:
  sdk: '>=2.17.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_reactive_ble: 5.4.0
  permission_handler: ^12.0.1
  flutter_local_notifications: ^18.0.1

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/hyicons.png"